site_name: browsix
site_url: https://mathiaspaulenko.github.io/browsix/
repo_url: https://github.com/MathiasPaulenko/browsix
repo_name: MathiasPaulenko/browsix

theme:
  name: material
  features:
    - navigation.sections
    - toc.integrate
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
